{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="{% url 'book_list' %}">
           <img src="{% static 'images/logo.png' %}" alt="Logo" width="60" height="60" class="me-2 rounded-circle bg-white p-1">
            Book Catalog
        </a>
    </div>
</nav>

<div class="container py-5">
    <div class="card book-detail-card">
        <div class="row g-0">
            <div class="col-md-4">
                <img src="{{ book.image.url }}" alt="{{ book.title }}" class="book-detail-img">
            </div>
            <div class="col-md-8">
                <div class="card-body p-4">
                    <h1 class="text-success fw-bold mb-3">{{ book.title }}</h1>

                    <p><strong>Muallif:</strong> {{ book.author }}</p>
                    <p><strong>Janr:</strong> {{ book.genre }}</p>

                    {% if book.is_favorite %}
                        <p><span class="badge bg-danger favorite-badge">❤️ Sevimli kitob</span></p>
                    {% endif %}

                    <hr>

                    <h5 class="fw-bold">Qisqacha ma’lumot</h5>
                    <p class="text-muted">{{ book.description }}</p>

                    <a href="{% url 'book_list' %}" class="btn btn-success mt-3">← Orqaga</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
